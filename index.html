<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach Marcus Fitness AI — Kodara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Merriweather:wght@400;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Atkinson+Hyperlegible:wght@400;700&family=Playfair+Display:wght@400;500;600;700&family=Lato:wght@400;700&family=Sora:wght@400;500;600;700&family=Karla:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Bitter:wght@400;500;600;700&family=Open+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Commissioner:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=Epilogue:wght@400;500;600;700&family=Crimson+Pro:wght@400;500;600;700&family=Public+Sans:wght@400;500;600;700&family=EB+Garamond:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600;700&family=Vollkorn:wght@400;500;600;700&family=Cabin:wght@400;500;600;700&family=Spectral:wght@400;500;600;700&family=Jost:wght@400;500;600;700&family=Work+Sans:wght@400;500;600;700&family=Libre+Franklin:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&family=Crimson+Text:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="design-tokens.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="animations.css">
</head>
<body>
  <div class="app-frame" id="app" data-demo="marcus">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
      <div class="sidebar-inner">
        <!-- User Info + Demo Switcher -->
        <div class="sidebar-header">
          <div class="sidebar-user" id="userProfileBtn">
            <div class="avatar avatar--sm">
              <div class="avatar-initials" id="sidebarAvatar">MF</div>
            </div>
            <span class="sidebar-username" id="sidebarUsername">Marcus Fitness</span>
            <svg class="sidebar-user-chevron" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 5l3 3 3-3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <!-- Demo switcher dropdown -->
          <div class="demo-dropdown hidden" id="demoDropdown">
            <div class="demo-dropdown__label">Switch coach</div>
            <div class="demo-dropdown__list" id="demoList">
              <!-- Items injected by JS -->
            </div>
          </div>
        </div>

        <!-- Nav Items -->
        <nav class="sidebar-nav">
          <a href="#" class="sidebar-item sidebar-item--active" data-view="dashboard">
            <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M10 3l-1 1m0 0l-1 1M9 4l1 1m-1-1V3m4 7a4 4 0 11-8 0 4 4 0 018 0z" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M5 10H3m14 0h-2M7.05 6.05L5.636 4.636m8.728 8.728L15.778 14.778M7.05 13.95l-1.414 1.414M14.364 5.636L15.778 4.222" stroke-linecap="round"/>
            </svg>
            <span>New Chat</span>
          </a>
          <a href="#" class="sidebar-item" data-view="chat">
            <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M8 12h.01M12 12h.01M16 12c0 3.314-2.686 5-6 5a8.065 8.065 0 01-2.472-.379L4 18v-3.08C2.78 13.752 2 12.428 2 11c0-3.314 2.686-6 6-6h2c3.314 0 6 2.686 6 6z" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>My Sessions</span>
          </a>
        </nav>

        <!-- Bottom Settings -->
        <div class="sidebar-footer">
          <a href="#" class="sidebar-item" id="settingsBtn">
            <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M10 13a3 3 0 100-6 3 3 0 000 6z"/>
              <path d="M10 1v2m0 14v2M4.22 4.22l1.42 1.42m8.72 8.72l1.42 1.42M1 10h2m14 0h2M4.22 15.78l1.42-1.42m8.72-8.72l1.42-1.42"/>
            </svg>
            <span>Settings</span>
          </a>
        </div>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main">

      <!-- Top Bar -->
      <header class="topbar">
        <div class="topbar-inner">
          <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu">
            <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 5h14M3 10h14M3 15h14" stroke-linecap="round"/>
            </svg>
          </button>
          <div class="topbar-left">
            <span class="topbar-label">New chat</span>
          </div>
          <button class="icon-btn" id="settingsTopBtn" aria-label="Settings">
            <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M10 13a3 3 0 100-6 3 3 0 000 6z"/>
              <path d="M10 1v2m0 14v2M4.22 4.22l1.42 1.42m8.72 8.72l1.42 1.42M1 10h2m14 0h2M4.22 15.78l1.42-1.42m8.72-8.72l1.42-1.42"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Background shapes -->
      <div class="bg-shapes">
        <div class="bg-ellipse bg-ellipse--1"></div>
        <div class="bg-ellipse bg-ellipse--2"></div>
      </div>

      <!-- ===== VIEW: DASHBOARD (empty state) ===== -->
      <section class="view view--dashboard" id="viewDashboard">
        <div class="dashboard-content">
          <!-- Hero Greeting -->
          <div class="hero-greeting">
            <div class="avatar avatar--lg">
              <div class="avatar-glow"></div>
              <div class="avatar-initials avatar-initials--lg">MF</div>
            </div>
            <h1 class="hero-heading">Hey there, ready to train?</h1>
          </div>

          <!-- Chat Input -->
          <div class="chat-input-card">
            <div class="chat-input-area">
              <textarea class="chat-textarea" id="chatInput" placeholder="Ask me about workouts, nutrition, recovery..." rows="1"></textarea>
            </div>
            <div class="chat-input-toolbar">
              <div class="toolbar-left">
                <button class="icon-btn icon-btn--subtle" aria-label="Attach file">
                  <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M10 5v10M5 10h10" stroke-linecap="round"/>
                  </svg>
                </button>
                <div class="agent-chip">
                  <svg class="agent-chip-icon" viewBox="0 0 12 12" fill="none">
                    <path d="M6 1l1.5 3 3.5.5-2.5 2.5.5 3.5L6 9l-3 1.5.5-3.5L1 4.5 4.5 4 6 1z" fill="currentColor"/>
                  </svg>
                  <span>Marcus AI</span>
                  <span class="agent-chip-badge">+3</span>
                </div>
              </div>
              <div class="toolbar-right">
                <div class="btn-group">
                  <button class="icon-btn icon-btn--subtle" aria-label="More options">
                    <svg class="icon" viewBox="0 0 20 20" fill="currentColor">
                      <circle cx="10" cy="5" r="1.5"/><circle cx="10" cy="10" r="1.5"/><circle cx="10" cy="15" r="1.5"/>
                    </svg>
                  </button>
                  <button class="icon-btn icon-btn--mic" aria-label="Voice input">
                    <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                      <path d="M10 2a3 3 0 00-3 3v5a3 3 0 006 0V5a3 3 0 00-3-3z"/>
                      <path d="M5 10a5 5 0 0010 0M10 15v3m-3 0h6" stroke-linecap="round"/>
                    </svg>
                  </button>
                </div>
                <button class="send-btn" id="sendBtn" aria-label="Send message">
                  <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10 15V5m0 0l-4 4m4-4l4 4" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <div class="send-btn-inset"></div>
                </button>
              </div>
            </div>
          </div>

          <!-- Suggestion Cards -->
          <div class="suggestions">
            <p class="suggestions-label">Common questions for Marcus</p>
            <div class="suggestions-grid">
              <button class="suggestion-card suggestion-card--highlighted" data-prompt="Scan this food photo and tell me the macros">
                Scan my meal photo and break down the macros
              </button>
              <button class="suggestion-card" data-prompt="Show my workouts and streak this month">
                Show my workout consistency and streak
              </button>
              <button class="suggestion-card" data-prompt="Can you do a form check on my squat?">
                Analyze my squat form and give feedback
              </button>
              <button class="suggestion-card" data-prompt="Show my macros and calories today">
                Show my nutrition dashboard for today
              </button>
            </div>
          </div>
        </div>
      </section>

      <!-- ===== VIEW: CHAT CONVERSATION ===== -->
      <section class="view view--chat hidden" id="viewChat">
        <div class="chat-messages" id="chatMessages">
          <!-- Messages will be injected here -->
        </div>

        <!-- Chat Input (bottom) -->
        <div class="chat-input-bottom">
          <div class="chat-input-card">
            <div class="chat-input-area">
              <textarea class="chat-textarea" id="chatInputBottom" placeholder="Ask me about workouts, nutrition, recovery..." rows="1"></textarea>
            </div>
            <div class="chat-input-toolbar">
              <div class="toolbar-left">
                <button class="icon-btn icon-btn--subtle" aria-label="Attach file">
                  <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M10 5v10M5 10h10" stroke-linecap="round"/>
                  </svg>
                </button>
                <div class="agent-chip">
                  <svg class="agent-chip-icon" viewBox="0 0 12 12" fill="none">
                    <path d="M6 1l1.5 3 3.5.5-2.5 2.5.5 3.5L6 9l-3 1.5.5-3.5L1 4.5 4.5 4 6 1z" fill="currentColor"/>
                  </svg>
                  <span>Marcus AI</span>
                  <span class="agent-chip-badge">+3</span>
                </div>
              </div>
              <div class="toolbar-right">
                <div class="btn-group">
                  <button class="icon-btn icon-btn--subtle" aria-label="More options">
                    <svg class="icon" viewBox="0 0 20 20" fill="currentColor">
                      <circle cx="10" cy="5" r="1.5"/><circle cx="10" cy="10" r="1.5"/><circle cx="10" cy="15" r="1.5"/>
                    </svg>
                  </button>
                  <button class="icon-btn icon-btn--mic" aria-label="Voice input">
                    <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                      <path d="M10 2a3 3 0 00-3 3v5a3 3 0 006 0V5a3 3 0 00-3-3z"/>
                      <path d="M5 10a5 5 0 0010 0M10 15v3m-3 0h6" stroke-linecap="round"/>
                    </svg>
                  </button>
                </div>
                <button class="send-btn" aria-label="Send message">
                  <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10 15V5m0 0l-4 4m4-4l4 4" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <div class="send-btn-inset"></div>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>

    </main>

    <!-- ===== SETTINGS MODAL ===== -->
    <div class="modal-overlay hidden" id="settingsModal">
      <div class="modal-backdrop"></div>
      <div class="settings-dialog">
        <div class="settings-header">
          <h2 class="settings-title">Settings</h2>
          <button class="close-btn" id="closeSettings" aria-label="Close">
            <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M6 6l8 8M14 6l-8 8" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <!-- Account Section -->
        <div class="settings-section">
          <div class="settings-section-header">
            <span class="settings-section-label">Account</span>
            <button class="settings-edit-btn">Edit</button>
          </div>
          <div class="settings-info-card">
            <div class="settings-row settings-row--bordered">
              <div class="settings-row-left">
                <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                  <circle cx="10" cy="7" r="3"/><path d="M3 18c0-3.314 3.134-6 7-6s7 2.686 7 6"/>
                </svg>
                <span>Name</span>
              </div>
              <span class="settings-row-value">Jamie Rodriguez</span>
            </div>
            <div class="settings-row settings-row--bordered">
              <div class="settings-row-left">
                <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="2" y="4" width="16" height="12" rx="2"/><path d="M2 6l8 5 8-5"/>
                </svg>
                <span>Email</span>
              </div>
              <span class="settings-row-value">jamie@email.com</span>
            </div>
            <div class="settings-row">
              <div class="settings-row-left">
                <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M3 5a2 2 0 012-2h2.28a1 1 0 01.948.684l.74 2.22a1 1 0 01-.45 1.13l-.85.56a10 10 0 004.77 4.77l.56-.85a1 1 0 011.13-.45l2.22.74a1 1 0 01.684.949V15a2 2 0 01-2 2h-1C7.61 17 3 12.39 3 6.5V5z"/>
                </svg>
                <span>Phone</span>
              </div>
              <span class="settings-row-value">+1 415 555 0142</span>
            </div>
          </div>
        </div>

        <!-- Password Section -->
        <div class="settings-section">
          <div class="settings-section-header">
            <span class="settings-section-label">Security</span>
            <button class="settings-edit-btn">Edit</button>
          </div>
          <div class="settings-info-card">
            <div class="settings-row">
              <div class="settings-row-left">
                <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="5" y="9" width="10" height="8" rx="2"/><path d="M7 9V6a3 3 0 016 0v3"/>
                </svg>
                <span>Password</span>
              </div>
              <span class="settings-row-value password-dots">••••••••••</span>
            </div>
          </div>
        </div>

        <button class="btn btn--primary btn--full">Save changes</button>
      </div>
    </div>

  </div>

  <!-- Animation diagnostic — remove after testing -->
  <div id="animDiag" style="position:fixed;bottom:20px;right:20px;z-index:9999;background:#ff0040;color:#fff;padding:16px 24px;border-radius:12px;font:bold 14px sans-serif;animation:diagBounce 1s ease-in-out infinite alternate;pointer-events:none;">
    ANIMATIONS WORKING
  </div>
  <style>
    @keyframes diagBounce { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-20px); opacity: 0.5; } }
    @media (prefers-reduced-motion: reduce) {
      #animDiag::after { content: ' — REDUCED MOTION IS ON'; }
    }
  </style>

  <script src="app.js"></script>
</body>
</html>
